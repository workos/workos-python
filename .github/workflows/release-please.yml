name: Release

on:
  push:
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        with:
          app-id: ${{ vars.SDK_BOT_APP_ID }}
          private-key: ${{ secrets.SDK_BOT_PRIVATE_KEY }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@7987652d64b4581673a76e33ad5e98e3dd56832f # v4.2.0
        with:
          token: ${{ steps.generate-token.outputs.token }}

      - name: Checkout release PR branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ fromJSON(steps.release.outputs.prs)[0].headBranchName }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Install uv
        if: steps.release.outputs.prs_created == 'true'
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0

      - name: Update lockfile
        if: steps.release.outputs.prs_created == 'true'
        run: |
          uv lock
          git config user.name "workos-bot[bot]"
          git config user.email "workos-bot[bot]@users.noreply.github.com"
          git add uv.lock
          git diff --staged --quiet || git commit -m "chore: update uv.lock"
          git push

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0

      - name: Build
        run: uv build

      - name: Publish to PyPI
        run: uv publish
